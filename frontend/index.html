<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Tasques</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,300italic,700,700italic">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.css">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="capcalera">
    <div class="container">
      <h1>Gestor de Tasques</h1>
      <p>Frontend per gestionar tasques amb FastAPI + MongoDB</p>
    </div>
  </header>

  <main class="container">
    <section class="panell">
      <h2>Crear nova tasca</h2>

      <form id="formulariTasca">
        <fieldset>
          <label for="titol">Títol</label>
          <input type="text" id="titol" name="titol" placeholder="Ex: Fer pràctica de FastAPI" required>

          <label for="descripcio">Descripció</label>
          <textarea id="descripcio" name="descripcio" placeholder="Descriu la tasca..." required></textarea>

          <div class="row">
            <div class="column">
              <label for="estat">Estat</label>
              <select id="estat" name="estat">
                <option value="pendent">Pendent</option>
                <option value="feta">Feta</option>
              </select>
            </div>
            <div class="column">
              <label for="prioritat">Prioritat</label>
              <select id="prioritat" name="prioritat">
                <option value="baixa">Baixa</option>
                <option value="mitjana">Mitjana</option>
                <option value="alta">Alta</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="column">
              <label for="categoria">Categoria</label>
              <input type="text" id="categoria" name="categoria" placeholder="Ex: estudis" required>
            </div>
            <div class="column">
              <label for="persona_assignada">Persona assignada</label>
              <input type="text" id="persona_assignada" name="persona_assignada" placeholder="Ex: Paco" required>
            </div>
          </div>

          <div class="accions-formulari">
            <button type="submit" class="button">Afegir tasca</button>
            <button type="button" id="cancelarEdicio" class="button button-outline ocult">Cancelar edició</button>
          </div>
        </fieldset>
      </form>

      <div id="missatge" class="missatge"></div>
    </section>

    <section class="panell">
      <h2>Buscar una tasca per ID</h2>
      <fieldset>
        <input type="text" id="idTasca" placeholder="Posa l'id de la tasca">
        <div class="row">
          <div class="column">
            <button class="button button-outline botons-busqueda" onclick="buscarUNA()">Buscar i mostrar JSON</button>
            <button class="button botons-busqueda" onclick="buscarUNA_i_editar()">Buscar i carregar al
              formulari</button>
          </div>
        </div>
      </fieldset>
      <pre id="resultat"><code></code></pre>
    </section>

    <section class="panell">
      <div class="row">
        <div class="column">
          <h2>Llista de tasques <span id="comptadorTasques" class="badge">0 tasques</span></h2>
        </div>
      </div>

      <div id="estatCarrega" class="estat-carrega">Carregant tasques...</div>
      <div id="llistaTasques" class="llista-tasques"></div>
    </section>
  </main>

  <template id="templateTasca">
    <article class="targeta-tasca panell">
      <div class="row targeta-superior">
        <div class="column column-75">
          <p class="id-tasca"><strong>ID:</strong> <span class="tasca-id"></span></p>
          <h3 class="tasca-titol"></h3>
          <p class="tasca-descripcio"></p>
        </div>
        <div class="column column-25" style="text-align: right;">
          <span class="tasca-estat badge"></span>
        </div>
      </div>

      <div class="row meta-tasca">
        <div class="column">
          <small><strong>Prioritat:</strong> <span class="tasca-prioritat"></span></small><br>
          <small><strong>Categoria:</strong> <span class="tasca-categoria"></span></small><br>
          <small><strong>Assignada a:</strong> <span class="tasca-persona"></span></small>
        </div>
      </div>

      <div class="row accions-tasca" style="margin-top: 1rem;">
        <div class="column">
          <button class="button button-warning boto-editar">Editar</button>
          <button class="button button-success boto-estat">Canviar estat</button>
          <button class="button button-danger boto-eliminar">Eliminar</button>
        </div>
      </div>
    </article>
  </template>

  <script src="javascript.js"></script>
</body>

</html>
